<input type="hidden" name="csrf_token" value="{{ csrf_token }}">
<div class="form-row">
  <label class="label" for="email">Email</label>
  <input id="email" type="text" name="email" class="input" autocomplete="email">
</div>
<div class="form-row">
  <label class="label" for="name">Name</label>
  <input id="name" type="text" name="name" class="input" autocomplete="name">
</div>
{% if error %}<p class="alert alert--error" data-error-code="{{ error }}">{{ error }}</p>{% endif %}
<div class="btn-group">
  <button type="submit" class="btn btn--primary">Sign in</button>
</div>
