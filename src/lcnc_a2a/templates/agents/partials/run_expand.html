<div class="run-trace-content" data-run-id="{{ run.id }}">
  {% if step_rows %}
    <table class="cds-table run-steps-table">
      <thead>
        <tr>
          <th>Seq</th>
          <th>Role</th>
          <th>Tool</th>
          <th>Content</th>
          <th>Args</th>
          <th>Result</th>
          <th class="num">Tokens in</th>
          <th class="num">Tokens out</th>
          <th class="num">Similarity</th>
          <th>Stage</th>
          <th>Step ID</th>
          <th>Step status</th>
          <th class="num">Duration (ms)</th>
          <th>Occurred</th>
        </tr>
      </thead>
      <tbody>
        {% for srow in step_rows %}
          {% include "agents/partials/step_row.html" %}
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p class="run-trace-empty">No steps recorded for this run.</p>
  {% endif %}
</div>
