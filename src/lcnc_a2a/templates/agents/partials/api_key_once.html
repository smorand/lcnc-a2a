{% set _key = plain_key|default(one_time_key) %}
<div class="alert alert--warning api-key-once" data-key-label="{{ label|default('default') }}">
  <div>
    <p>Copy this API key now. It will not be shown again in plain text.</p>
    <code class="api-key-once__value">{{ _key }}</code>
    <div class="btn-group">
      <button type="button" class="btn btn--secondary btn--sm" data-copy-target="{{ _key }}">Copy</button>
    </div>
  </div>
</div>
